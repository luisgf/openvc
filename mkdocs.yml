site_name: openvc
site_description: A dependency-light Verifiable Credentials core for Python
repo_url: https://github.com/luisgf/openvc
repo_name: luisgf/openvc
docs_dir: docs

# Historical / non-doc-site files that live under docs/ but are not part of the site.
exclude_docs: |
  SESSION-HANDOFF.md

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - toc.follow
  palette:
    - scheme: default
      primary: indigo
      toggle: { icon: material/weather-night, name: Dark mode }
    - scheme: slate
      primary: indigo
      toggle: { icon: material/weather-sunny, name: Light mode }

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_root_heading: true
            show_source: true
            members_order: source
            docstring_section_style: table
            filters: ["!^_"]

nav:
  - Home: index.md
  - API reference:
      - Verification pipeline: api/verification.md
      - Proof suites: api/proofs.md
      - DIDs & keys: api/dids-keys.md
      - Status lists: api/status.md
      - Credential schema: api/schema.md
      - Issuer-key discovery: api/discovery.md
      - Errors: api/errors.md
  - Conventions: CONVENTIONS.md
  - Versioning & deprecation: versioning.md
  - Threat model: threat-model.md
  - Roadmap: ROADMAP.md
  - Design decisions:
      - "ADR-0001 — EBSI HTTP client": adr/ADR-0001-ebsi-http-client.md
