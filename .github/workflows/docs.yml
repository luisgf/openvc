name: docs

# Build the mkdocs site and publish it to GitHub Pages via the Actions
# deployment flow (repo Pages source = "GitHub Actions" / build_type: workflow).
# No gh-pages branch is involved: the built site is uploaded as a Pages artifact
# and deployed by actions/deploy-pages.
on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'src/openvc/**'
      - 'README.md'
      - '.github/workflows/docs.yml'
  # PRs run the strict build only (no deploy): a broken nav entry, dead link,
  # or bad mkdocstrings identifier fails the PR instead of surfacing after merge.
  pull_request:
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'src/openvc/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

# Least privilege for the Actions Pages deployment: read the repo, write the
# Pages deployment, and mint the OIDC token deploy-pages needs.
permissions:
  contents: read
  pages: write
  id-token: write

# One live deployment at a time; let an in-flight publish finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: pip

      - name: Install (docs)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[docs]"

      - name: Build (strict)
        run: mkdocs build --strict --site-dir ./site

      - uses: actions/configure-pages@v5
        if: github.event_name != 'pull_request'
      - uses: actions/upload-pages-artifact@v3
        if: github.event_name != 'pull_request'
        with:
          path: ./site

  deploy:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
