name: docs

# Build the mkdocs site and publish it to the gh-pages branch on every push to
# main that touches the docs or the documented modules.
# PREREQUISITE (one-time human setup): enable GitHub Pages for this repo, serving
# from the `gh-pages` branch. This workflow only creates/updates that branch.
on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'src/openvc/**'
      - 'README.md'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: write        # push the built site to gh-pages

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: pip

      - name: Install (docs)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[docs]"

      - name: Build + deploy to gh-pages
        run: mkdocs gh-deploy --force --strict
