name: CI

on:
  push:
    branches: [main]
    tags: ['v*']          # pushing a vX.Y.Z tag builds, tests, and publishes
  pull_request:
  workflow_dispatch:

# Least privilege by default; the publish job widens this for OIDC.
permissions:
  contents: read

# Supersede in-progress runs for the same PR ref, but never cancel a main/tag build
# (a cancelled tag build would skip the publish).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    name: test (py${{ matrix.python-version }}${{ matrix.pyld != 'latest' && format(', pyld {0}', matrix.pyld) || '' }}${{ matrix.extras != 'all' && ', pre-release' || '' }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # 3.15 is still a pre-release (final 2026-10-01), so its leg is advisory: it
    # reports but never blocks a merge. Drop this line when 3.15.0 ships and the
    # trove classifier goes in (#126) — the version pin needs no edit, since
    # allow-prereleases only falls back to a pre-release while no GA build exists.
    continue-on-error: ${{ matrix.python-version == '3.15' }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
        pyld: ['latest']
        extras: ['all']
        include:
          # The [data-integrity] floor edge (#124): oldest supported pyld on the
          # oldest Python; every other job resolves the newest pyld (3.x). The
          # golden fixtures are the canonicalization-drift alarm on both edges.
          - python-version: '3.10'
            pyld: '2.0.4'
            extras: 'all'
          # Pre-release watch (#126). Installs core + ebsi + dev, NOT [all]:
          # lxml — pulled in by signxml and by pyld 3.x — publishes no cp315
          # wheel yet, and building it from source would test lxml's build, not
          # openvc. The DI / trustlist / schema suites therefore importorskip
          # here (~1028 of 1107 tests still run, hence the lower coverage floor
          # below). What this leg does watch is the hand-rolled, attacker-facing
          # core — JOSE, CBOR/COSE, the codecs, status lists, DID resolution —
          # on the new interpreter. Widen to 'all' once lxml ships cp315 wheels.
          - python-version: '3.15'
            pyld: 'latest'
            extras: 'ebsi,dev'

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          # Only consulted when a version line has no GA build yet (today: 3.15).
          allow-prereleases: true
          cache: pip

      - name: Install (core + [${{ matrix.extras }}])
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[${{ matrix.extras }}]"
          if [ "${{ matrix.pyld }}" != "latest" ]; then pip install "pyld==${{ matrix.pyld }}"; fi

      - name: Lint (flake8)
        run: flake8 src tests

      - name: Type check (mypy)
        run: mypy

      # Offline tier only: the live EBSI smoke test stays opt-in
      # (OPENVC_EBSI_LIVE=1) so CI never depends on an external service.
      - name: Test (pytest + coverage)
        # The pre-release leg skips the pyld/signxml/jsonschema-gated suites, so it
        # is held to the local gate's floor (80) instead of the full-matrix 85.
        run: >-
          pytest -q --cov=openvc --cov=openvc_ebsi
          --cov-report=term-missing
          --cov-fail-under=${{ matrix.extras == 'all' && '85' || '80' }}

  publish:
    name: Publish to PyPI
    # Fires only when a vX.Y.Z tag is pushed, and only if the whole test matrix
    # passed. Uses PyPI Trusted Publishing (OIDC) — no API token in the repo.
    # PREREQUISITE: configure openvc's trusted publisher on PyPI (this repo +
    # this workflow + the `pypi` environment) before the first tag push.
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: pypi
    permissions:
      contents: read         # checkout (a job-level permissions block replaces the
      id-token: write        # workflow default, so re-grant read) + OIDC for publishing
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
