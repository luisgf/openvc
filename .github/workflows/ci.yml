name: CI

on:
  push:
    branches: [main]
    tags: ['v*']          # pushing a vX.Y.Z tag builds, tests, and publishes
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install (core + ebsi + dev)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all]"

      - name: Lint (flake8)
        run: flake8 src tests

      - name: Type check (mypy)
        run: mypy

      # Offline tier only: the live EBSI smoke test stays opt-in
      # (OPENVC_EBSI_LIVE=1) so CI never depends on an external service.
      - name: Test (pytest)
        run: pytest -q

  publish:
    name: Publish to PyPI
    # Fires only when a vX.Y.Z tag is pushed, and only if the whole test matrix
    # passed. Uses PyPI Trusted Publishing (OIDC) — no API token in the repo.
    # PREREQUISITE: configure openvc's trusted publisher on PyPI (this repo +
    # this workflow + the `pypi` environment) before the first tag push.
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write        # OIDC token for Trusted Publishing
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
